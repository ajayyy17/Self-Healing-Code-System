<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Asthma Prediction System</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script defer src="/static/app.js"></script>
</head>
<body>
  <main class="container">
    <h1>Asthma Prediction</h1>

    <form id="asthmaForm" class="form" novalidate>
      <label for="bmi">BMI (15 &lt;= BMI &lt;= 45)</label>
      <input id="bmi" name="bmi" type="number" step="0.1" min="15" max="45" placeholder="e.g. 22.5" required />

      <label for="family_history">Family History</label>
      <select id="family_history" name="family_history" required>
        <option value="">-- Select --</option>
        <option value="0">0 - No</option>
        <option value="1">1 - Yes</option>
      </select>

      <label for="smoking_status">Smoking Status</label>
      <select id="smoking_status" name="smoking_status" required>
        <option value="">-- Select --</option>
        <option value="Current">Current</option>
        <option value="Former">Former</option>
        <option value="Never">Never</option>
      </select>

      <label for="allergies">Allergies</label>
      <select id="allergies" name="allergies" required>
        <option value="">-- Select --</option>
        <option value="None">None</option>
        <option value="Dust">Dust</option>
        <option value="Pollen">Pollen</option>
        <option value="Pets">Pets</option>
        <option value="Multiple">Multiple</option>
      </select>

      <label for="air_pollution_level">Air Pollution Level</label>
      <select id="air_pollution_level" name="air_pollution_level" required>
        <option value="">-- Select --</option>
        <option value="Low">Low</option>
        <option value="Moderate">Moderate</option>
        <option value="High">High</option>
      </select>

      <label for="physical_activity_level">Physical Activity Level</label>
      <select id="physical_activity_level" name="physical_activity_level" required>
        <option value="">-- Select --</option>
        <option value="Active">Active</option>
        <option value="Moderate">Moderate</option>
        <option value="Sedentary">Sedentary</option>
      </select>

      <button id="predictBtn" type="submit">Predict Asthma</button>

      <div id="message" class="message" aria-live="polite"></div>
      <div id="result" class="result"></div>
    </form>

    <footer class="footer">
      <small>Make sure the server (`app.py`) is running on port <code>8010</code>.</small>
    </footer>
  </main>
</body>
</html>
